name: Build and publish Docker image to quay.io
on:
  push:
    branches:
      - 'develop'
      - 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  REPOSITORY: quay.io/sdase/image-metadata-collector

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go for Tests
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'

      - name: Test with Go
        run: go test -race -coverprofile=coverage.out ./...

      - name: Semantic Release Dry Run
        id: semantic-release-dry
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          dry_run: true
          extra_plugins: |
            @semantic-release/git@10.0.1
            @semantic-release/release-notes-generator@14.0.3
            @semantic-release/github@11.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Semantic Release Version
        id: get-version
        run: |
          branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          sanitized_branch=$(echo "${branch}" | tr '/' '-')
          if [ "${branch}" == "main" ]; then
            if [ -z "${{ steps.semantic-release-dry.outputs.new_release_version }}" ]; then
              echo "semantic release not detecting a new version, using latest tag"
              VERSION=$(git describe --tags --abbrev=0)
            else
              VERSION=${{ steps.semantic-release-dry.outputs.new_release_version }}
            fi
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=${sanitized_branch}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Quay.io
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Build image and push to Quay.io
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REPOSITORY }}:${{ steps.get-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Release and Publish
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          extra_plugins: |
            @semantic-release/git@10.0.1
            @semantic-release/release-notes-generator@14.0.3
            @semantic-release/github@11.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
