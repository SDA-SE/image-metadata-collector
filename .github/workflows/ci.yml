name: CI

on:
  pull_request:
  push:
    branches:
      - 'fix/*'
      - 'feat/*'
      - 'develop'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REPOSITORY: quay.io/sdase/image-metadata-collector

jobs:
  pr-validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'

      - name: Build with Go
        run: go build ./...

      - name: Test with Go
        run: go test -race -coverprofile=coverage.out ./...

      - name: Verify Go Modules
        run: go mod verify

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image (validation only)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          platforms: linux/amd64
          tags: image-metadata-collector:pr-validation
          cache-from: type=gha
          cache-to: type=gha,mode=max

  branch-image:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'

      - name: Test with Go
        run: go test -race -coverprofile=coverage.out ./...

      - name: Compute image tag
        id: image-tag
        run: |
          normalized_branch=$(printf '%s' "${GITHUB_REF_NAME}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#[/[:space:]]+#-#g; s#[^a-z0-9._-]#-#g; s#[-.]+#-#g; s#^-+##; s#-+$##')

          if [ -z "${normalized_branch}" ]; then
            echo "Normalized branch name is empty" >&2
            exit 1
          fi

          short_sha=$(git rev-parse --short=7 HEAD)
          max_branch_length=$((128 - 1 - ${#short_sha}))
          trimmed_branch=$(printf '%s' "${normalized_branch}" | cut -c1-"${max_branch_length}")
          trimmed_branch=$(printf '%s' "${trimmed_branch}" | sed -E 's#[-.]+$##')

          if [ -z "${trimmed_branch}" ]; then
            echo "Trimmed branch name is empty" >&2
            exit 1
          fi

          echo "version=${trimmed_branch}-${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to Quay.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Build image and push to Quay.io
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REPOSITORY }}:${{ steps.image-tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
