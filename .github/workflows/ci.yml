name: CI

on:
  pull_request:
  push:
    branches:
      - 'fix/*'
      - 'feat/*'
      - 'develop'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REPOSITORY: quay.io/sdase/image-metadata-collector

jobs:
  pr-validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Build with Go
        run: go build ./...

      - name: Test with Go
        run: go test -race -coverprofile=coverage.out ./...

      - name: Verify Go Modules
        run: go mod verify

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image (validation only)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          platforms: linux/amd64
          tags: image-metadata-collector:pr-validation
          cache-from: type=gha
          cache-to: type=gha,mode=max

  branch-image:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Test with Go
        run: go test -race -coverprofile=coverage.out ./...

      - name: Compute image tag
        id: image-tag
        run: |
          normalized_branch=$(printf '%s' "${GITHUB_REF_NAME}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#[/[:space:]]+#-#g; s#[^a-z0-9._-]#-#g; s#[-.]+#-#g; s#^-+##; s#-+$##')

          if [ -z "${normalized_branch}" ]; then
            echo "Normalized branch name is empty" >&2
            exit 1
          fi

          short_sha=$(git rev-parse --short=7 HEAD)
          max_branch_length=$((128 - 1 - ${#short_sha}))
          trimmed_branch=$(printf '%s' "${normalized_branch}" | cut -c1-"${max_branch_length}")
          trimmed_branch=$(printf '%s' "${trimmed_branch}" | sed -E 's#[-.]+$##')

          if [ -z "${trimmed_branch}" ]; then
            echo "Trimmed branch name is empty" >&2
            exit 1
          fi

          echo "version=${trimmed_branch}-${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Quay.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Build image and push to Quay.io
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REPOSITORY }}:${{ steps.image-tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
